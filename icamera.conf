# v4l2-relayd instance for Intel IPU cameras (icamerasrc).
#
# Generic across Intel IPU platforms (IPU6, IPU7, ...) and sensors:
#   - no device-name -> uses the HAL's default (first) camera
#   - loopback is matched by CARD_LABEL, not a fixed /dev/videoN
#   - icamerasrc emits system-memory NV12 (default userptr io-mode), so
#     videoconvert alone turns it into YUY2 -- no GL/GPU bounce needed.
#
# On-demand: while no app has the loopback open, relayd feeds SPLASHSRC (a
# static pattern, sensor OFF) so the device stays capture-ready under
# exclusive_caps=1. When an app opens it, relayd switches to VIDEOSRC and the
# sensor turns ON; when the app closes, it reverts to the splash (sensor OFF).
#
# VIDEOSRC/SPLASHSRC must each END IN A REAL ELEMENT (here: capsfilter), never a
# bare "! video/x-raw,...". relayd passes these descriptions to gst_parse_launch
# verbatim (it appends its own appsink by linking to the trailing src pad); a
# pipeline ending in a shorthand capsfilter fails to parse ("no element video"),
# comes back NULL, and relayd never feeds the loopback (device stays
# output-only, no camera). Use "capsfilter caps=..." to pin the format instead.
#
# Keep WIDTH/HEIGHT/FRAMERATE/FORMAT below in sync with the caps in VIDEOSRC.
#
VIDEOSRC="icamerasrc ! video/x-raw,format=NV12,width=1920,height=1080,framerate=30/1 ! videoconvert ! capsfilter caps=video/x-raw,format=YUY2,width=1280,height=720,framerate=30/1"

SPLASHSRC="videotestsrc is-live=true pattern=black ! videoconvert ! capsfilter caps=video/x-raw,format=YUY2,width=1920,height=1080,framerate=30/1"

FORMAT=YUY2
WIDTH=1920
HEIGHT=1080
FRAMERATE=30/1

